user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # ── Basic settings ─────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;

    # ── Gzip compression ───────────────────────────────────────────────────────
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_min_length     1024;
    gzip_buffers        16 8k;
    gzip_http_version   1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ── Upstream – backend API service ─────────────────────────────────────────
    upstream backend_api {
        # In Kubernetes this resolves to the backend ClusterIP service.
        # In docker-compose it resolves to the 'backend' service name.
        server backend:5000;
        keepalive 32;
    }

    server {
        listen       80;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # ── Security headers ───────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"                        always;
        add_header X-Content-Type-Options    "nosniff"                           always;
        add_header X-XSS-Protection          "1; mode=block"                     always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy        "geolocation=(), microphone=()"     always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:;"
            always;

        # ── Health-check endpoint (used by Docker HEALTHCHECK & K8s probes) ────
        location = /health {
            access_log  off;
            return 200 "OK\n";
            add_header  Content-Type text/plain;
        }

        # ── Proxy /api/ → backend ──────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 90s;
            proxy_connect_timeout 10s;
        }

        # ── Proxy /ws/ → backend (WebSocket) ───────────────────────────────────
        location /ws/ {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        # ── Static assets – long-lived cache ──────────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
            access_log  off;
        }

        # ── SPA fallback ───────────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── 50x error pages ───────────────────────────────────────────────────
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
