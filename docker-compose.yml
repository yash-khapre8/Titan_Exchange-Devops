version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# TitanExchange – Local Development Stack (Frontend Only)
# ──────────────────────────────────────────────────────────────────────────────

networks:
  titan-network:
    driver: bridge

services:
  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: titan-frontend
    ports:
      - "3000:80"
    networks:
      - titan-network
    restart: unless-stopped
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
