version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# TitanExchange – Production-like Compose (Frontend Only)
# ──────────────────────────────────────────────────────────────────────────────

networks:
  titan-network:
    driver: bridge

services:
  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    image: ${ECR_REGISTRY}/titan-exchange-frontend:${IMAGE_TAG:-latest}
    container_name: titan-frontend-prod
    ports:
      - "80:80"
    networks:
      - titan-network
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
