# ─────────────────────────────────────────────────────────────────────────────
# IMPORTANT: In production, these values are injected by HashiCorp Vault Agent
# sidecar and should NEVER be stored as plaintext in this file.
# This template file is committed to source control with placeholder values
# only. Real values live in Vault at secret/data/titan-exchange/*.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: titan-exchange-secrets
  namespace: titan-exchange
  labels:
    app.kubernetes.io/name: titan-exchange
    app.kubernetes.io/component: secrets
  annotations:
    # Vault injection annotation — Vault Agent will populate these
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "titan-exchange-backend"
type: Opaque
stringData:
  # Use Vault injection in production — replace placeholders via CI/CD
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_VAULT_SECRET"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_VAULT_SECRET"
  COGNITO_USER_POOL_ID: "REPLACE_WITH_VAULT_SECRET"
  COGNITO_CLIENT_ID: "REPLACE_WITH_VAULT_SECRET"
  JWT_SECRET: "REPLACE_WITH_VAULT_SECRET_MIN_32_CHARS"
