apiVersion: apps/v1
kind: Deployment
metadata:
  name: titan-frontend
  namespace: titan-exchange
  labels:
    app.kubernetes.io/name: titan-exchange
    app.kubernetes.io/component: frontend
    app: titan-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: titan-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: titan-frontend
        app.kubernetes.io/name: titan-exchange
        app.kubernetes.io/component: frontend
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: false  # nginx needs root to bind port 80 inside container
        fsGroup: 101
      containers:
        - name: frontend
          image: ${ECR_REGISTRY}/titan-exchange-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          securityContext:
            allowPrivilegeEscalation: false
