apiVersion: v1
kind: ConfigMap
metadata:
  name: titan-exchange-config
  namespace: titan-exchange
  labels:
    app.kubernetes.io/name: titan-exchange
    app.kubernetes.io/component: config
data:
  NODE_ENV: "production"
  AWS_REGION: "ap-south-1"
  PORT: "5000"
  LOG_LEVEL: "info"
  # DynamoDB table names
  DYNAMODB_USERS_TABLE: "titan_users"
  DYNAMODB_ORDERS_TABLE: "titan_orders"
  DYNAMODB_HOLDINGS_TABLE: "titan_holdings"
  DYNAMODB_TRANSACTIONS_TABLE: "titan_transactions"
  DYNAMODB_WATCHLISTS_TABLE: "titan_watchlists"
  DYNAMODB_AUDIT_LOGS_TABLE: "titan_audit_logs"
  DYNAMODB_MARKET_DATA_TABLE: "titan_market_data"
  # WebSocket
  WS_HEARTBEAT_INTERVAL: "30000"
  # Rate limiting
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"
