apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: titan-frontend-ingress
  namespace: titan-exchange
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
spec:
  tls:
  - hosts:
    - trade.titanexchange.com
    secretName: titan-tls-secret
  rules:
  - host: trade.titanexchange.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: titan-frontend-svc
            port:
              number: 80
